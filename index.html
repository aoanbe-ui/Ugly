<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soft Chaos Circus 🎪</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: "Comic Sans MS", cursive;
    background: linear-gradient(270deg, red, orange, yellow, green, blue, purple);
    background-size: 1200% 1200%;
    animation: bgMove 4s infinite alternate;
}

/* violently moving rainbow */
@keyframes bgMove {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

/* title */
h1 {
    position: absolute;
    top: 25%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 80px;
    animation: wobble 1s infinite,
               colorShift 1s infinite,
               glitch 0.3s infinite;
}

/* glitch chaos */
@keyframes glitch {
    0% { text-shadow: 5px 0 red, -5px 0 blue; }
    50% { text-shadow: -5px 0 lime, 5px 0 magenta; }
    100% { text-shadow: 5px 0 cyan, -5px 0 yellow; }
}

/* wobble */
@keyframes wobble {
    0% { transform: translate(-50%, -50%) rotate(-10deg) scale(1); }
    50% { transform: translate(-50%, -50%) rotate(10deg) scale(1.3); }
    100% { transform: translate(-50%, -50%) rotate(-10deg) scale(1); }
}

/* seizure color shift */
@keyframes colorShift {
    0% { color: red; }
    25% { color: yellow; }
    50% { color: lime; }
    75% { color: cyan; }
    100% { color: magenta; }
}

/* spinning cursed box */
.box {
    width: 150px;
    height: 150px;
    position: absolute;
    top: 60%;
    left: 20%;
    background: repeating-linear-gradient(
        90deg,
        hotpink,
        hotpink 5px,
        black 5px,
        black 10px
    );
    animation: spinCrazy 1s infinite linear,
               float 2s infinite ease-in-out,
               skew 0.5s infinite alternate;
}

@keyframes spinCrazy {
    from { transform: rotate(0deg); }
    to { transform: rotate(720deg); }
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-150px); }
    100% { transform: translateY(0); }
}

@keyframes skew {
    0% { transform: skew(0deg, 0deg); }
    100% { transform: skew(30deg, 10deg); }
}

/* blobs everywhere automatically */
.blob {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    position: absolute;
    opacity: 0.9;
    mix-blend-mode: difference;
    animation: drift 3s infinite ease-in-out,
               squish 0.6s infinite,
               spinCrazy 2s infinite linear;
}

/* drifting */
@keyframes drift {
    0% { transform: translate(0,0); }
    50% { transform: translate(100px, -200px); }
    100% { transform: translate(0,0); }
}

/* horrible squish */
@keyframes squish {
    0% { transform: scale(1,1); }
    50% { transform: scale(2,0.3); }
    100% { transform: scale(1,1); }
}

/* rotating borders everywhere */
.frame {
    position: absolute;
    width: 200px;
    height: 200px;
    border: 10px dashed lime;
    top: 10%;
    left: 10%;
    animation: spinCrazy 3s infinite linear;
}

.frame2 {
    position: absolute;
    width: 250px;
    height: 250px;
    border: 15px dotted red;
    bottom: 10%;
    right: 10%;
    animation: spinCrazy 2s infinite reverse linear;
}

/* swinging bars */
.bar {
    position: absolute;
    width: 300px;
    height: 20px;
    background: repeating-linear-gradient(45deg, yellow, black 10px);
    top: 50%;
    left: 50%;
    transform-origin: left;
    animation: swing 1s infinite alternate;
}

@keyframes swing {
    0% { transform: rotate(-30deg); }
    100% { transform: rotate(30deg); }
}

/* flashing circles */
.circle {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    animation: flash 0.5s infinite;
}

@keyframes flash {
    0% { background: red; }
    25% { background: blue; }
    50% { background: yellow; }
    75% { background: lime; }
    100% { background: magenta; }
}

</style>
</head>

<body>

<h1>🎪 SOFT CHAOS CIRCUS 🤡</h1>

<div class="box"></div>

<div class="frame"></div>
<div class="frame2"></div>

<div class="bar"></div>
<div class="blob" style="top:10%; left:30%; background:red;"></div>
<div class="blob" style="top:70%; left:60%; background:blue;"></div>
<div class="blob" style="top:40%; left:80%; background:yellow;"></div>
<div class="blob" style="top:80%; left:20%; background:lime;"></div>
<div class="blob" style="top:20%; left:70%; background:magenta;"></div>

<!-- flashing circles -->
<div class="circle" style="top:15%; left:15%;"></div>
<div class="circle" style="top:75%; left:75%;"></div>
<div class="circle" style="top:50%; left:10%;"></div>

</body>
</html>
