<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soft Chaos Circus 🎪</title>

<style>
body {
    background: linear-gradient(
        135deg,
        #ffd1dc,
        #ffe8b0, 
        #d0f0fd, 
        #c8facc, 
        #fddde6
    );
    background-size: 400% 400%;
    animation: rainbowGradient 20s ease infinite;
    margin: 0;
    font-family: 'Arial', sans-serif;
}

@keyframes rainbowGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* background rainbow animation */
@keyframes bgMove {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

.header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 80px;
    border-bottom: 5px dashed pink;
    display: flex;
    align-items: center;
    justify-content: space-around;
    z-index: 0;
}

.nav-button {
    padding: 10px 20px;
    border: 3px solid #ff6f91;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
    transition: all 0.3s;
}

.nav-button:hover {
    background: #00c2a8;
    color: white;
    transform: rotate(-5deg) scale(1.2);
}

/* fake content boxes */
.info-box {
    position: absolute;
    width: 200px;
    height: 120px;
    border: 4px dashed #ff6f91;
    padding: 10px;
    font-size: 14px;
    font-weight: bold;
    color: #333;
    text-align: center;
    z-index: 0;
}

/* title animations (in front) */
h1 {
    position: absolute;
    top: 25%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 80px;
    animation: wobble 1s infinite,
               colorShift 1s infinite,
               glitch 0.3s infinite;
    z-index: 2;
}

/* glitch chaos */
@keyframes glitch {
    0% { text-shadow: 5px 0 red, -5px 0 blue; }
    50% { text-shadow: -5px 0 lime, 5px 0 magenta; }
    100% { text-shadow: 5px 0 cyan, -5px 0 yellow; }
}

/* wobble */
@keyframes wobble {
    0% { transform: translate(-50%, -50%) rotate(-10deg) scale(1); }
    50% { transform: translate(-50%, -50%) rotate(10deg) scale(1.3); }
    100% { transform: translate(-50%, -50%) rotate(-10deg) scale(1); }
}

/* color shift */
@keyframes colorShift {
    0% { color: red; }
    25% { color: yellow; }
    50% { color: lime; }
    75% { color: cyan; }
    100% { color: magenta; }
}

/* spinning cursed box */
.box {
    width: 150px;
    height: 150px;
    position: absolute;
    top: 60%;
    left: 20%;
    background: repeating-linear-gradient(
        90deg,
        hotpink,
        hotpink 5px,
        black 5px,
        black 10px
    );
    animation: spinCrazy 1s infinite linear,
               float 2s infinite ease-in-out,
               skew 0.5s infinite alternate;
    z-index: 1;
}

@keyframes spinCrazy {
    from { transform: rotate(0deg); }
    to { transform: rotate(720deg); }
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-150px); }
    100% { transform: translateY(0); }
}

@keyframes skew {
    0% { transform: skew(0deg, 0deg); }
    100% { transform: skew(30deg, 10deg); }
}

/* blobs */
.blob {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    position: absolute;
    opacity: 0.9;
    mix-blend-mode: difference;
    animation: drift 3s infinite ease-in-out,
               squish 0.6s infinite,
               spinCrazy 2s infinite linear;
    z-index: 1;
}

/* drifting */
@keyframes drift {
    0% { transform: translate(0,0); }
    50% { transform: translate(100px, -200px); }
    100% { transform: translate(0,0); }
}

/* horrible squish */
@keyframes squish {
    0% { transform: scale(1,1); }
    50% { transform: scale(2,0.3); }
    100% { transform: scale(1,1); }
}

/* rotating frames */
.frame {
    position: absolute;
    width: 200px;
    height: 200px;
    border: 10px dashed lime;
    top: 10%;
    left: 10%;
    animation: spinCrazy 3s infinite linear;
    z-index: 1;
}

.frame2 {
    position: absolute;
    width: 250px;
    height: 250px;
    border: 15px dotted red;
    bottom: 10%;
    right: 10%;
    animation: spinCrazy 2s infinite reverse linear;
    z-index: 1;
}

/* swinging bars */
.bar {
    position: absolute;
    width: 300px;
    height: 20px;
    background: repeating-linear-gradient(45deg, yellow, black 10px);
    top: 50%;
    left: 50%;
    transform-origin: left;
    animation: swing 1s infinite alternate;
    z-index: 1;
}

@keyframes swing {
    0% { transform: rotate(-30deg); }
    100% { transform: rotate(30deg); }
}

/* flashing circles */
.circle {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    animation: flash 0.5s infinite;
    z-index: 1;
}

@keyframes flash {
    0% { background: red; }
    25% { background: blue; }
    50% { background: yellow; }
    75% { background: lime; }
    100% { background: magenta; }
}

</style>
</head>

<body>

<!-- fake site header -->
<div class="header">
    <div class="nav-button">Home</div>
    <div class="nav-button">About</div>
    <div class="nav-button">Schedule</div>
    <div class="nav-button">Tickets</div>
    <div class="nav-button">Contact</div>
</div>

<!-- fake content/info boxes -->
<div class="info-box" style="top:120px; left:50px;">Welcome to Soft Chaos Circus! 🤡</div>
<div class="info-box" style="top:250px; left:400px;">Events Every Day! 🎪</div>
<div class="info-box" style="top:500px; left:100px;">Tickets Start at $10 💸</div>

<h1>🎪 SOFT CHAOS CIRCUS 🤡</h1>

<div class="box"></div>

<div class="frame"></div>
<div class="frame2"></div>
<div class="bar"></div>

<!-- blobs -->
<div class="blob" style="top:10%; left:30%; background:red;"></div>
<div class="blob" style="top:70%; left:60%; background:blue;"></div>
<div class="blob" style="top:40%; left:80%; background:yellow;"></div>
<div class="blob" style="top:80%; left:20%; background:lime;"></div>
<div class="blob" style="top:20%; left:70%; background:magenta;"></div>

<!-- flashing circles -->
<div class="circle" style="top:15%; left:15%;"></div>
<div class="circle" style="top:75%; left:75%;"></div>
<div class="circle" style="top:50%; left:10%;"></div>

</body>
</html>
