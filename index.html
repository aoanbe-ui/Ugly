<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ugly Chaos Page</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Comic Sans MS, cursive;
    animation: bgFlash 0.2s infinite alternate;
}

/* Background flashing */
@keyframes bgFlash {
    0% { background: red; }
    25% { background: lime; }
    50% { background: blue; }
    75% { background: yellow; }
    100% { background: magenta; }
}

/* Random floating text */
.text {
    position: absolute;
    font-size: 30px;
    animation: moveCrazy 3s infinite, rotate 1s infinite linear, colorShift 0.5s infinite;
    transition: all 0.2s ease-in-out;
}

.text:hover {
    transform: scale(3) skew(20deg);
    letter-spacing: 20px;
}

/* Movement chaos */
@keyframes moveCrazy {
    0% { top: 10%; left: 10%; }
    25% { top: 80%; left: 20%; }
    50% { top: 30%; left: 90%; }
    75% { top: 60%; left: 40%; }
    100% { top: 10%; left: 10%; }
}

/* Rotation */
@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Color madness */
@keyframes colorShift {
    0% { color: cyan; }
    25% { color: red; }
    50% { color: lime; }
    75% { color: purple; }
    100% { color: orange; }
}

/* Button chaos */
button {
    position: absolute;
    top: 50%;
    left: 50%;
    padding: 20px;
    font-size: 20px;
    cursor: pointer;
    animation: spinBtn 2s infinite linear, pulse 0.5s infinite alternate;
    transition: all 0.1s;
}

button:hover {
    transform: scale(2) rotate(720deg);
    background: black;
    color: white;
    border-radius: 50%;
}

/* Button animations */
@keyframes spinBtn {
    from { transform: rotate(0deg); }
    to { transform: rotate(-360deg); }
}

@keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.5); }
}

/* Glitch box */
.box {
    width: 100px;
    height: 100px;
    position: absolute;
    top: 20%;
    left: 70%;
    background: white;
    animation: glitch 0.2s infinite, bounce 1s infinite;
    transition: all 0.3s;
}

.box:hover {
    width: 300px;
    height: 10px;
    background: black;
}

/* Glitch animation */
@keyframes glitch {
    0% { transform: translate(0,0); }
    25% { transform: translate(10px,-10px); }
    50% { transform: translate(-10px,10px); }
    75% { transform: translate(5px,-5px); }
    100% { transform: translate(0,0); }
}

/* Bounce */
@keyframes bounce {
    0%,100% { top: 20%; }
    50% { top: 80%; }
}

/* Spinning image */
img {
    position: absolute;
    bottom: 10%;
    left: 10%;
    width: 150px;
    animation: spinImg 0.5s infinite linear, skewCrazy 1s infinite alternate;
    transition: all 0.2s;
}

img:hover {
    transform: scale(5) rotate(999deg);
}

/* Image animations */
@keyframes spinImg {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes skewCrazy {
    from { transform: skew(0deg); }
    to { transform: skew(45deg); }
}
