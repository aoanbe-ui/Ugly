<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soft Chaos Circus 🎪</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: "Comic Sans MS", cursive;
    background: linear-gradient(135deg, #ffb3c6, #bde0fe, #caffbf);
    animation: bgMove 6s infinite alternate;
}

/* slow moving background */
@keyframes bgMove {
    0% { background-position: left; }
    100% { background-position: right; }
}

/* title */
h1 {
    position: absolute;
    top: 25%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 70px;
    color: #ff6f91;
    animation: wobble 2s infinite ease-in-out,
               colorShift 3s infinite;
}

/* soft wobble */
@keyframes wobble {
    0% { transform: translate(-50%, -50%) rotate(-5deg); }
    50% { transform: translate(-50%, -50%) rotate(5deg) scale(1.1); }
    100% { transform: translate(-50%, -50%) rotate(-5deg); }
}

/* pastel color shift */
@keyframes colorShift {
    0% { color: #ff6f91; }
    50% { color: #00c2a8; }
    100% { color: #ffd166; }
}

/* weird striped box */
.box {
    width: 120px;
    height: 120px;
    position: absolute;
    top: 60%;
    left: 20%;
    background: repeating-linear-gradient(
        45deg,
        #ffadad,
        #ffadad 10px,
        #caffbf 10px,
        #caffbf 20px
    );
    animation: float 3s infinite ease-in-out,
               spin 5s infinite linear;
    transition: all 0.3s;
}

.box:hover {
    border-radius: 50%;
    transform: scale(2) rotate(180deg);
}

/* floating */
@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-80px); }
    100% { transform: translateY(0); }
}

/* slow spin */
@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* clown blobs */
.blob {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    position: absolute;
    animation: drift 4s infinite ease-in-out,
               squish 1.5s infinite;
    opacity: 0.8;
}

/* drifting */
@keyframes drift {
    0% { transform: translate(0,0); }
    50% { transform: translate(50px, -100px); }
    100% { transform: translate(0,0); }
}

/* ugly squish */
@keyframes squish {
    0% { transform: scale(1,1); }
    50% { transform: scale(1.5,0.6); }
    100% { transform: scale(1,1); }
}

/* button */
button {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 25px;
    font-size: 18px;
    background: #ffd166;
    border: none;
    cursor: pointer;
    animation: wiggle 1s infinite;
    transition: all 0.3s;
}

button:hover {
    background: #00c2a8;
    color: white;
    transform: translateX(-50%) scale(1.5) rotate(-10deg);
}

/* wiggle */
@keyframes wiggle {
    0% { transform: translateX(-50%) rotate(-2deg); }
    50% { transform: translateX(-50%) rotate(2deg); }
    100% { transform: translateX(-50%) rotate(-2deg); }
}
</style>
</head>

<body>

<h1>🎪 Soft Chaos Circus 🤡</h1>

<div class="box"></div>

<button onclick="spawn()">click if you dare</button>

<script>
function spawn() {
    for (let i = 0; i < 15; i++) {
        let b = document.createElement("div");
        b.className = "blob";

        b.style.top = Math.random() * window.innerHeight + "px";
        b.style.left = Math.random() * window.innerWidth + "px";

        let colors = ["#ffadad", "#ffd6a5", "#caffbf", "#9bf6ff", "#bdb2ff"];
        b.style.background = colors[Math.floor(Math.random() * colors.length)];

        b.style.animationDuration = (Math.random() * 3 + 1) + "s";

        document.body.appendChild(b);
    }
}
</script>

</body>
</html>
