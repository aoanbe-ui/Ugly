<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CHAOS CIRCUS 🎪</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: "Comic Sans MS", cursive;
    animation: bgFlash 0.3s infinite alternate;
}

/* Background flashing */
@keyframes bgFlash {
    0% { background: red; }
    20% { background: yellow; }
    40% { background: lime; }
    60% { background: cyan; }
    80% { background: magenta; }
    100% { background: orange; }
}

/* Giant spinning title */
h1 {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 80px;
    animation: spin 1s infinite linear, colorShift 0.2s infinite;
}

/* spinning */
@keyframes spin {
    from { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
    to { transform: translate(-50%, -50%) rotate(360deg) scale(1.5); }
}

/* color flicker */
@keyframes colorShift {
    0% { color: white; }
    50% { color: black; }
    100% { color: hotpink; }
}

/* bouncing clown box */
.box {
    width: 100px;
    height: 100px;
    background: radial-gradient(circle, red, yellow);
    position: absolute;
    animation: bounce 0.5s infinite alternate,
               rotateCrazy 0.7s infinite,
               skewMadness 0.3s infinite;
}

/* bounce everywhere */
@keyframes bounce {
    from { top: 0; left: 0; }
    to { top: 80%; left: 80%; }
}

/* rotation chaos */
@keyframes rotateCrazy {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(720deg); }
    100% { transform: rotate(-720deg); }
}

/* skew insanity */
@keyframes skewMadness {
    0% { transform: skew(0deg); }
    50% { transform: skew(60deg); }
    100% { transform: skew(-60deg); }
}

/* clown noses (random circles) */
.circle {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    position: absolute;
    animation: float 2s infinite alternate,
               pulse 0.2s infinite;
}

/* float movement */
@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(-200px); }
}

/* size pulsing */
@keyframes pulse {
    0% { transform: scale(1); background: red; }
    50% { transform: scale(2); background: blue; }
    100% { transform: scale(0.5); background: yellow; }
}

/* flashing buttons */
button {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 20px;
    font-size: 20px;
    border: none;
    cursor: pointer;
    animation: glitch 0.1s infinite;
    transition: all 0.2s;
}

/* glitch effect */
@keyframes glitch {
    0% { transform: translateX(-50%) translate(0,0); }
    25% { transform: translateX(-50%) translate(5px,-5px); }
    50% { transform: translateX(-50%) translate(-5px,5px); }
    75% { transform: translateX(-50%) translate(5px,5px); }
    100% { transform: translateX(-50%) translate(0,0); }
}

/* hover gets worse */
button:hover {
    background: black;
    color: white;
    transform: translateX(-50%) scale(3) rotate(360deg);
}
</style>
</head>

<body>

<h1>🤡 CHAOS CIRCUS 🎪</h1>

<div class="box"></div>

<button onclick="spawnChaos()">DO NOT CLICK</button>

<script>
function spawnChaos() {
    for (let i = 0; i < 20; i++) {
        let c = document.createElement("div");
        c.className = "circle";

        c.style.top = Math.random() * window.innerHeight + "px";
        c.style.left = Math.random() * window.innerWidth + "px";

        c.style.animationDuration = (Math.random() * 2 + 0.2) + "s";

        document.body.appendChild(c);
    }

    // Also shake the entire page
    document.body.style.animation = "bgFlash 0.1s infinite";
}
</script>

</body>
</html>
